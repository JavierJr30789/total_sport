<p>carrito works!</p>
<div class="container d-flex justify-content-center">
    <div class="row">
      <ng-container *ngFor="let item of productosEnCarrito">
        <div class="col-md-4 mb-3">
          <div class="card" style="width: 18rem;">
            <img src="{{item.Producto.imagen}}" class="card-img-top" alt="{{item.Producto.nombre}}">
            <div class="card-body">
              <p class="card-text">
                {{ item.Producto.nombre }} <br> ${{ item.Producto.precio }} <br> (cantidad: {{ item.Cantidad }})
              </p>
            </div>
          </div>
        </div>
      </ng-container>
      <!-- Contenedor para el subtotal y el botón de confirmación -->
      <div class="row mt-3">
        <div class="col-md-12 text-center">
          <h5>Subtotal: ${{ calcularSubtotal() }}</h5>
          <button mat-raised-button color="primary" (click)="confirmarCompra()">Confirmar Compra</button>
        </div>
      </div>
    </div>
    </div>
